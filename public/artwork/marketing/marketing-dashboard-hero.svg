<!-- MyCardArchive Phase 25 — dashboard hero. Export PNG: 1600×480 (or @2x). No UI text. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" fill="none" role="img" aria-labelledby="md-t"><title id="md-t">MyCardArchive dashboard hero</title>
