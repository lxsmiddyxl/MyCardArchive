<!-- MyCardArchive Phase 27 — scan card -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" fill="none" role="img" aria-labelledby="ob-scan-t">
  <title id="ob-scan-t">Scan a card</title>
  <defs>
    <linearGradient id="ob-s-bg" x1="0" y1="40" x2="520" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18181b"/>
      <stop offset="1" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="ob-s-scan" x1="120" y1="148" x2="400" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#6ee7b7" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="520" height="280" rx="36" fill="url(#ob-s-bg)"/>
  <!-- Device -->
  <rect x="150" y="44" width="220" height="192" rx="32" fill="#27272a" stroke="#52525b" stroke-width="2.5"/>
  <rect x="172" y="68" width="176" height="144" rx="20" fill="#09090b" stroke="#3f3f46"/>
  <!-- Card in frame -->
  <rect x="196" y="88" width="128" height="100" rx="16" fill="#3f3f46" stroke="#71717a" stroke-width="1.75" transform="rotate(-4 260 138)"/>
  <rect x="214" y="104" width="80" height="10" rx="5" fill="#10b981" fill-opacity="0.4"/>
  <rect x="214" y="122" width="48" height="8" rx="4" fill="#52525b"/>
  <!-- Scan line -->
  <rect x="178" y="140" width="164" height="6" rx="3" fill="url(#ob-s-scan)"/>
  <!-- Corner marks -->
  <path d="M178 76h-14v14M178 204h-14v-14M346 76h14v14M346 204h14v-14" stroke="#34d399" stroke-width="2.75" stroke-linecap="round" opacity="0.7"/>
  <!-- Focus hint -->
  <circle cx="388" cy="60" r="8" stroke="#f59e0b" stroke-width="2" fill="#f59e0b" fill-opacity="0.15"/>
</svg>
