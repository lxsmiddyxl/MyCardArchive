<!-- MyCardArchive Phase 30  tiling card surface (use as background or pattern fill). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none" role="img" aria-labelledby="br-srf-t">
  <title id="br-srf-t">MyCardArchive card surface pattern</title>
  <defs>
    <pattern id="brpat" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#09090b"/>
      <rect x="36" y="44" width="100" height="120" rx="22" fill="#18181b" stroke="#27272a" stroke-width="2" opacity="0.95"/>
      <rect x="52" y="72" width="68" height="8" rx="4" fill="#10b981" fill-opacity="0.25"/>
      <rect x="120" y="118" width="56" height="72" rx="14" fill="#18181b" stroke="#27272a" stroke-width="2" opacity="0.75" transform="rotate(6 148 154)"/>
      <circle cx="160" cy="56" r="6" fill="#f59e0b" fill-opacity="0.2"/>
    </pattern>
    <linearGradient id="brsurf-v" x1="400" y1="0" x2="400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#09090b"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#brsurf-v)"/>
  <rect width="800" height="800" fill="url(#brpat)" opacity="0.85"/>
</svg>
